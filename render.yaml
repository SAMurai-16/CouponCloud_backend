services:
  - type: web
    name: coupon-cloud-backend
    env: python
    plan: starter
    buildCommand: python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: coupon-cloud-db
          property: connectionString

databases:
  - name: coupon-cloud-db
    plan: starter
